body:
  text: 西天譯經三藏朝散大夫試光祿卿明教大師臣法賢奉詔譯如是我聞一時佛在舍衛國祇樹給孤獨園與大苾芻衆千二百五十人俱復有八大菩薩摩訶薩其名曰妙吉祥菩薩摩訶薩聖觀自在菩薩摩訶薩慈氏菩薩摩訶薩虛空藏菩薩摩訶薩普賢菩薩摩訶薩金剛手菩薩摩訶薩除蓋障菩薩摩訶薩地藏菩薩摩訶薩以為上首復有諸大菩薩摩訶薩其名曰無能勝菩薩摩訶薩龍相菩薩摩訶薩喜意菩薩摩訶薩無垢藏菩薩摩訶薩無垢稱菩薩摩訶薩智王菩薩摩訶薩無邊軍菩薩摩訶薩智光菩薩摩訶薩慧光菩薩摩訶薩慧燈菩薩摩訶薩智燈菩薩摩訶薩梵授菩薩摩訶薩天冠菩薩摩訶薩如是等諸大菩薩皆來會坐爾時世尊告舍利弗汝今諦聽過東方恆河沙數世界有一佛剎名無能勝彼土有佛名善精進吉祥如來應正等覺現為衆生說微妙法復次舍利弗又過東方十恆河沙世界有一佛剎名曰無我彼土有佛號普照如來應供正等覺現為衆生說微妙法復次舍利弗又過東方三恆河沙數世界有一佛剎名曰善愛彼土有佛號吉祥如來應供正等覺現為衆生說微妙法復次舍利弗又過東方三十四恆河沙世界有一佛剎名寂靜藏彼土有佛號印捺囉計覩特嚩惹王如來應供正等覺現為衆生說微妙法復次舍利弗又過東方五恆河沙世界有一佛剎名曰離塵彼土有佛號喜功德光自在王如來應供正等覺現為衆生說微妙法佛告舍利弗若有善男子善女人等於此經中聞是諸佛如來名號一心諦聽或自憶念或書寫讀誦為他解說彼人命終不墮惡趣不生邊地邪見諸惡律儀下賤族中亦不生於長壽天中亦不生於五濁惡世飢饉疾病刀兵劫中亦無王難水難火難賊盜虎狼等難常生佛剎及天上人間身相端嚴諸根具足眷屬圓滿得宿命智具六波羅蜜行四無量法通達一切甚深法藏成最上道佛說此經已諸大菩薩舍利弗及諸苾芻天人阿修羅等聞佛所說皆大歡喜信受奉行
